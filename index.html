  <style>
    /* Premium Sleek Preloader */
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #ffffff;
    }
    .loader-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loader-title {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.18em;
      margin-bottom: 24px;
      text-transform: uppercase;
      color: #ffffff;
      animation: pulse-text 2s infinite ease-in-out;
    }
    .loader-bar-bg {
      width: 160px;
      height: 2px;
      background-color: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .loader-bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 40%;
      background-color: #1C00FF; /* Electric Blue Accent */
      box-shadow: 0 0 8px rgba(28, 0, 255, 0.8);
      border-radius: 4px;
      animation: slide-loading 1.6s infinite ease-in-out;
    }
    @keyframes pulse-text {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }
    @keyframes slide-loading {
      0% { left: -40%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="loader-content">
      <div class="loader-title">Kedar Sukerkar</div>
      <div class="loader-bar-bg">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
